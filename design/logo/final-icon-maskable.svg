<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="퀄리오 아이콘">
  <defs>
    <linearGradient id="qim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#065f46"/>
      <stop offset="0.55" stop-color="#059669"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="qim-sheen" cx="0.3" cy="0" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="qim-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#022c22" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- maskable: 안전영역(가운데 80%) 안에 로고 배치, 풀블리드 배경 -->
  <rect width="512" height="512" fill="url(#qim)"/>
  <rect width="512" height="512" fill="url(#qim-sheen)"/>
  <g filter="url(#qim-shadow)" fill="none" stroke="#ffffff" stroke-width="38" stroke-linecap="round">
    <circle cx="248" cy="238" r="98"/>
    <line x1="292" y1="282" x2="356" y2="346"/>
  </g>
</svg>
